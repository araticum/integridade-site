<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Programa de Integridade - Araticum</title>
    <style>
      :root {
        --bg-primary: #141414;
        --bg-secondary: #1c1c1c;
        --bg-card: #1f1f1f;
        --border-color: #2e2e2e;
        --text-primary: #e0ddd8;
        --text-secondary: #a8a49e;
        --text-muted: #6e6a64;
        --accent: #c8944a;
        --accent-hover: #b07e3a;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, sans-serif;
        background: linear-gradient(180deg, #121212 0%, var(--bg-primary) 55%);
        color: var(--text-primary);
      }
      .wrap { max-width: 1080px; margin: 0 auto; padding: 34px 20px 56px; }
      .company {
        margin: 0 0 16px;
        text-align: center;
        color: var(--accent);
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      h1 { margin: 0 0 8px; font-size: 2rem; }
      p.lead { margin: 0 0 24px; color: var(--text-secondary); }
      .panel {
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: 14px;
        overflow: hidden;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.32);
      }
      .panel + .panel { margin-top: 14px; }
      .panel-head {
        width: 100%;
        border: 0;
        background: #2c2418;
        color: var(--text-primary);
        text-align: left;
        font-size: 1rem;
        font-weight: 700;
        padding: 14px 16px;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .panel-head:hover { background: #34291b; }
      .panel-body { padding: 16px; display: none; }
      .panel.open .panel-body { display: block; }
      .chev { color: var(--accent); font-weight: 700; }
      .doc h1,.doc h2,.doc h3,.doc h4 { margin: 14px 0 8px; }
      .doc p { margin: 10px 0; color: var(--text-primary); line-height: 1.55; white-space: pre-wrap; }
      .doc ul,.doc ol { margin: 8px 0 8px 20px; }
      .doc li { margin: 4px 0; line-height: 1.45; }
      .doc hr { border: 0; border-top: 1px solid var(--border-color); margin: 14px 0; }
      .doc strong { color: #ecfff5; }
      .table-wrap {
        border: 1px solid var(--border-color);
        border-radius: 10px;
        overflow: auto;
        margin-top: 8px;
      }
      table { width: 100%; border-collapse: collapse; min-width: 960px; }
      th, td {
        border-bottom: 1px solid var(--border-color);
        padding: 9px 10px;
        text-align: left;
        font-size: 0.9rem;
        vertical-align: top;
      }
      th { background: var(--bg-secondary); position: sticky; top: 0; }
      .manifest {
        margin-top: 14px;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid var(--border-color);
        background: #24201a;
      }
      .manifest h4 { margin: 0 0 8px; color: var(--accent); }
      .manifest p { margin: 5px 0; color: var(--text-secondary); font-size: 0.9rem; }
      .manifest code {
        font-family: ui-monospace, "JetBrains Mono", monospace;
        color: #ecfff5;
        background: #31271b;
        border-radius: 6px;
        padding: 1px 6px;
        word-break: break-all;
      }
      .page-verify {
        margin-top: 18px;
        text-align: center;
        color: var(--text-secondary);
        font-size: 0.95rem;
      }
      .verify-status {
        margin-top: 8px;
        text-align: center;
        color: var(--text-muted);
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <p class="company">Araticum</p>
      <h1>Programa de Integridade</h1>
      <p class="lead">Consulta pública dos documentos oficiais e da validação de assinatura.</p>

      <section class="panel open" data-file="declaracao_compromisso_etico.md">
        <button class="panel-head" type="button">Declaração de Compromisso Ético <span class="chev">−</span></button>
        <div class="panel-body">
          <div class="doc" data-render="markdown"></div>
          <div class="manifest" data-manifest></div>
        </div>
      </section>

      <section class="panel" data-file="politica_relacionamento_setor_publico.md">
        <button class="panel-head" type="button">Política de Relacionamento com o Setor Público <span class="chev">+</span></button>
        <div class="panel-body">
          <div class="doc" data-render="markdown"></div>
          <div class="manifest" data-manifest></div>
        </div>
      </section>

      <section class="panel" data-file="politica_canal_etico.md">
        <button class="panel-head" type="button">Política do Canal Ético <span class="chev">+</span></button>
        <div class="panel-body">
          <div class="doc" data-render="markdown"></div>
          <div class="manifest" data-manifest></div>
        </div>
      </section>

      <section class="panel" data-file="mapeamento_riscos.csv">
        <button class="panel-head" type="button">Mapeamento de Riscos (visualização inline) <span class="chev">+</span></button>
        <div class="panel-body">
          <div class="doc" data-render="csv"></div>
          <div class="manifest" data-manifest></div>
        </div>
      </section>

      <section class="panel" data-file="CHANGELOG.md">
        <button class="panel-head" type="button">Changelog <span class="chev">+</span></button>
        <div class="panel-body">
          <div class="doc" data-render="markdown"></div>
          <div class="manifest" data-manifest></div>
        </div>
      </section>
    </main>

    <script>
      const panelEls = [...document.querySelectorAll(".panel")];

      function escapeHtml(v) {
        return v
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function inlineFormat(text) {
        return escapeHtml(text).replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
      }

      function markdownToHtml(markdown) {
        const lines = markdown.split(/\r?\n/);
        let html = "";
        let inUl = false;
        let inOl = false;
        let inP = false;

        function closeLists() {
          if (inUl) { html += "</ul>"; inUl = false; }
          if (inOl) { html += "</ol>"; inOl = false; }
        }
        function closeP() {
          if (inP) { html += "</p>"; inP = false; }
        }

        for (const rawLine of lines) {
          const line = rawLine;
          const trimmed = line.trim();

          if (!trimmed) {
            closeP();
            closeLists();
            continue;
          }
          if (trimmed === "---") {
            closeP();
            closeLists();
            html += "<hr>";
            continue;
          }
          const h = trimmed.match(/^(#{1,4})\s+(.+)$/);
          if (h) {
            closeP();
            closeLists();
            const lvl = h[1].length;
            html += `<h${lvl}>${inlineFormat(h[2])}</h${lvl}>`;
            continue;
          }
          const ul = trimmed.match(/^-\s+(.+)$/);
          if (ul) {
            closeP();
            if (inOl) { html += "</ol>"; inOl = false; }
            if (!inUl) { html += "<ul>"; inUl = true; }
            html += `<li>${inlineFormat(ul[1])}</li>`;
            continue;
          }
          const ol = trimmed.match(/^\d+\.\s+(.+)$/);
          if (ol) {
            closeP();
            if (inUl) { html += "</ul>"; inUl = false; }
            if (!inOl) { html += "<ol>"; inOl = true; }
            html += `<li>${inlineFormat(ol[1])}</li>`;
            continue;
          }

          closeLists();
          if (!inP) { html += "<p>"; inP = true; }
          html += `${inlineFormat(line)}<br>`;
        }

        closeP();
        closeLists();
        return html;
      }

      function parseCsvLine(line) {
        const out = [];
        let cell = "";
        let quoted = false;
        for (let i = 0; i < line.length; i += 1) {
          const ch = line[i];
          if (ch === '"') {
            if (quoted && line[i + 1] === '"') { cell += '"'; i += 1; }
            else { quoted = !quoted; }
          } else if (ch === "," && !quoted) {
            out.push(cell);
            cell = "";
          } else {
            cell += ch;
          }
        }
        out.push(cell);
        return out;
      }

      function csvToHtml(csv) {
        const lines = csv.split(/\r?\n/).filter(Boolean);
        if (!lines.length) return "<p>Sem conteúdo.</p>";
        const headers = parseCsvLine(lines[0]);
        const rows = lines.slice(1).map(parseCsvLine);
        return `
          <div class="table-wrap">
            <table>
              <thead><tr>${headers.map((h) => `<th>${escapeHtml(h)}</th>`).join("")}</tr></thead>
              <tbody>
                ${rows.map((r) => `<tr>${r.map((c) => `<td>${escapeHtml(c)}</td>`).join("")}</tr>`).join("")}
              </tbody>
            </table>
          </div>`;
      }

      function parseManifestData(text) {
        const map = {};
        let generatedAt = "";
        const lines = text.split(/\r?\n/);
        for (const ln of lines) {
          const g = ln.match(/^#\s+Gerado em:\s+(.+)$/i);
          if (g) generatedAt = g[1].trim();
          const m = ln.match(/^([a-f0-9]{64})\s+(.+)$/i);
          if (m) map[m[2].trim()] = m[1].toLowerCase();
        }
        return { hashes: map, generatedAt };
      }

      function renderManifest(file, pedroData, daniloData) {
        const pedro = pedroData.hashes[file];
        const danilo = daniloData.hashes[file];
        return `
          <h4>Manifesto de Integridade</h4>
          <p><strong>Assinante:</strong> Pedro Miranda - Sócio/Administrador</p>
          <p><strong>SHA-256:</strong> ${pedro ? `<code>${pedro}</code>` : "não registrado para este arquivo"}</p>
          <p><strong>Data/hora do hash:</strong> ${pedroData.generatedAt || "não informada"}</p>
          <p><strong>Assinante:</strong> Danilo Almeida - Sócio/Administrador</p>
          <p><strong>SHA-256:</strong> ${danilo ? `<code>${danilo}</code>` : "não registrado para este arquivo"}</p>
          <p><strong>Data/hora do hash:</strong> ${daniloData.generatedAt || "não informada"}</p>
        `;
      }

      function setupCollapse() {
        for (const panel of panelEls) {
          const btn = panel.querySelector(".panel-head");
          const chev = btn.querySelector(".chev");
          btn.addEventListener("click", () => {
            panel.classList.toggle("open");
            chev.textContent = panel.classList.contains("open") ? "−" : "+";
          });
        }
      }

      async function loadAll() {
        setupCollapse();
        const [pedroManifest, daniloManifest] = await Promise.all([
          fetch("./assinaturas/pedro/manifesto-sha256.txt", { cache: "no-store" }).then((r) => r.text()),
          fetch("./assinaturas/danilo/manifesto-sha256.txt", { cache: "no-store" }).then((r) => r.text())
        ]);
        const pedroData = parseManifestData(pedroManifest);
        const daniloData = parseManifestData(daniloManifest);

        for (const panel of panelEls) {
          const file = panel.getAttribute("data-file");
          const render = panel.querySelector("[data-render]").getAttribute("data-render");
          const target = panel.querySelector("[data-render]");
          const manifestTarget = panel.querySelector("[data-manifest]");

          const raw = await fetch(`./${file}`, { cache: "no-store" }).then((r) => r.text());
          if (render === "csv") target.innerHTML = csvToHtml(raw);
          else target.innerHTML = markdownToHtml(raw);
          manifestTarget.innerHTML = renderManifest(file, pedroData, daniloData);
        }

        try {
          const v = await fetch("./assinaturas/validacao.json", { cache: "no-store" }).then((r) => r.json());
          const el = document.getElementById("verify-status");
          if (el) {
            el.textContent = v.ok
              ? `Status da validação automática: válido (${v.validated_at_utc})`
              : "Status da validação automática: inválido";
          }
        } catch (_e) {
          const el = document.getElementById("verify-status");
          if (el) el.textContent = "Status da validação automática: indisponível";
        }
      }

      loadAll();
    </script>
    <p class="page-verify"><a href="./verify-docs.sh">Validar assinatura</a></p>
    <p class="verify-status" id="verify-status"></p>
  </body>
</html>
